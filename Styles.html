<style>
  /* ===================================================================
     Sistema de diseño — Evaluación de Perfil Integral
     Tema oscuro de alto contraste, tipografía Inter, glassmorphism.
     La interfaz se ADAPTA al módulo activo: cada etapa tiene su color
     de acento (--accent), que fluye por progreso, selección y ambiente.
     =================================================================== */
  :root {
    --bg-0:#070b18; --bg-1:#0d1326; --panel:#141b33; --panel-2:#1a2342;
    --ink:#f3f6fd; --ink-2:#cdd7ee; --muted:#9aa8cc; --line:#27314f;
    --brand:#5b8cff; --brand-2:#9a6bff; --ok:#33d6a6; --warn:#ffb648; --pink:#ff7ab8; --bad:#ff6b7d;

    /* Acentos por módulo — la UI cambia de identidad según la pregunta */
    --m-personality:#5b8cff; --m-personality-2:#9a6bff; --m-personality-rgb:91,140,255;
    --m-cognitive:#2bd3a3;   --m-cognitive-2:#36c6ff;   --m-cognitive-rgb:43,211,163;
    --m-emotional:#ff7ab8;   --m-emotional-2:#ff5f9e;   --m-emotional-rgb:255,122,184;
    --m-stealth:#ffb648;     --m-stealth-2:#ff8a5b;     --m-stealth-rgb:255,182,72;

    /* Acento activo (por defecto = marca) */
    --accent:var(--brand); --accent-2:var(--brand-2); --accent-rgb:91,140,255;

    --radius:20px; --radius-sm:13px;
    --shadow:0 18px 50px rgba(0,0,0,.45);
    --maxw:760px;
    --safe-b:env(safe-area-inset-bottom, 0px);
    --safe-t:env(safe-area-inset-top, 0px);
  }

  /* Conmutadores de acento por módulo (data-module en <body>) */
  body[data-module="personality"]{ --accent:var(--m-personality); --accent-2:var(--m-personality-2); --accent-rgb:var(--m-personality-rgb); }
  body[data-module="cognitive"]  { --accent:var(--m-cognitive);   --accent-2:var(--m-cognitive-2);   --accent-rgb:var(--m-cognitive-rgb); }
  body[data-module="emotional"]  { --accent:var(--m-emotional);   --accent-2:var(--m-emotional-2);   --accent-rgb:var(--m-emotional-rgb); }
  body[data-module="stealth"]    { --accent:var(--m-stealth);     --accent-2:var(--m-stealth-2);     --accent-rgb:var(--m-stealth-rgb); }

  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { -webkit-text-size-adjust:100%; }
  html,body { margin:0; padding:0; }
  body {
    font-family:'Inter', -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    color:var(--ink);
    accent-color:var(--accent);
    background:
      radial-gradient(1000px 700px at 15% -10%, #1d2b5e 0%, rgba(29,43,94,0) 55%),
      radial-gradient(900px 600px at 110% 10%, #3a1f5e 0%, rgba(58,31,94,0) 50%),
      var(--bg-0);
    min-height:100vh; line-height:1.6; font-size:16px; overflow-x:hidden;
  }
  @media (min-width:680px){ body{ font-size:17px; } }

  /* Fondo animado — los orbes adoptan el acento del módulo activo */
  .bg-orbs { position:fixed; inset:0; z-index:0; pointer-events:none; filter:blur(60px); opacity:.55; }
  .orb { position:absolute; border-radius:50%; transition:background .7s ease; }
  .o1 { width:340px;height:340px;left:-80px;top:-60px;background:radial-gradient(circle,rgba(var(--accent-rgb),.95),transparent 70%); }
  .o2 { width:420px;height:420px;right:-120px;top:30%;background:radial-gradient(circle,var(--accent-2),transparent 70%); }
  .o3 { width:300px;height:300px;left:20%;bottom:-100px;background:radial-gradient(circle,#33d6a6,transparent 70%); }

  #app { position:relative; z-index:1; max-width:var(--maxw); margin:0 auto; padding:max(22px,var(--safe-t)) 16px 80px; }
  @media (min-width:680px){ #app{ padding:48px 20px 90px; } }

  /* Pantallas */
  .screen { display:none; }
  .screen.active { display:block; animation:screen-in .45s ease both; }
  @keyframes screen-in { from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:none; } }

  /* Tarjetas */
  .card {
    background:linear-gradient(180deg, rgba(26,35,66,.92), rgba(20,27,51,.92));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:24px; box-shadow:var(--shadow); backdrop-filter:blur(10px);
  }
  @media (min-width:680px){ .card{ padding:34px; } }
  .center { text-align:center; }

  /* Tipografía */
  h1,h2,h3,h4 { margin:0; line-height:1.2; letter-spacing:-.01em; }
  .kicker { text-transform:uppercase; letter-spacing:.18em; font-size:.72rem; font-weight:700; color:var(--accent); margin-bottom:14px; transition:color .45s ease; }
  .title { font-size:clamp(1.9rem, 6vw, 3rem); font-weight:900; }
  .grad { background:linear-gradient(90deg,var(--brand),var(--brand-2) 55%,var(--pink)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .lead { font-size:1.06rem; color:var(--ink-2); margin:14px 0 6px; }
  .muted { color:var(--muted); }
  .small { font-size:.86rem; }

  .chips { display:flex; flex-wrap:wrap; gap:10px; margin:22px 0; }
  .chip { font-size:.86rem; font-weight:600; padding:9px 14px; border-radius:999px;
    background:rgba(255,255,255,.04); border:1px solid var(--line); transition:transform .15s ease, border-color .2s, background .2s; }
  .chip:hover { transform:translateY(-2px); }

  /* Formulario */
  .form-grid { display:grid; grid-template-columns:1fr 120px 1fr; gap:14px; margin:8px 0 22px; }
  label { display:flex; flex-direction:column; gap:7px; font-size:.82rem; font-weight:600; color:var(--muted); }
  input, select {
    background:#0c1126; border:1px solid var(--line); color:var(--ink);
    border-radius:var(--radius-sm); padding:14px; font-size:1rem; font-family:inherit; min-height:50px;
    transition:border-color .2s, box-shadow .2s;
  }
  input::placeholder { color:#5e6b8e; }
  input:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 4px rgba(var(--accent-rgb),.18); }

  /* Botones */
  button { cursor:pointer; font-family:inherit; border:none; border-radius:var(--radius-sm); font-weight:700;
    transition:transform .12s, filter .2s, background .25s, border-color .2s, box-shadow .25s, color .2s; }
  button:active { transform:translateY(1px) scale(.99); }
  .primary { background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#fff; padding:14px 22px; font-size:1rem;
    min-height:50px; box-shadow:0 8px 24px rgba(var(--accent-rgb),.35); }
  .primary:hover { filter:brightness(1.08); box-shadow:0 12px 30px rgba(var(--accent-rgb),.45); }
  .primary.big { width:100%; padding:16px; font-size:1.08rem; min-height:54px; }
  .ghost { background:transparent; color:var(--ink-2); border:1px solid var(--line); padding:14px 20px; min-height:50px; }
  .ghost:hover { border-color:var(--accent); color:#fff; }
  .ghost:disabled { opacity:.35; cursor:not-allowed; }

  /* Foco accesible por teclado */
  button:focus-visible, .lk:focus-visible, .opt:focus-visible, .fc-pick button:focus-visible {
    outline:none; box-shadow:0 0 0 3px var(--bg-0), 0 0 0 5px var(--accent); }

  /* ===================== ETAPA ===================== */
  .stage { padding:46px 24px; }
  .stage-icon { font-size:4.4rem; line-height:1; margin-bottom:8px; filter:drop-shadow(0 8px 20px rgba(0,0,0,.4)); }
  .stage-kicker { text-transform:uppercase; letter-spacing:.16em; font-size:.78rem; font-weight:800; color:var(--accent); transition:color .45s ease; }
  .stage-title { font-size:clamp(1.7rem,5vw,2.4rem); font-weight:900; margin:8px 0 10px; }
  .stage-sub { color:var(--ink-2); max-width:48ch; margin:0 auto 26px; }

  /* ===================== TEST ===================== */
  .test-top { margin-bottom:18px; }
  .seg { display:flex; gap:6px; margin-bottom:10px; }
  .seg > div { flex:1; height:6px; border-radius:99px; background:#1c2542; overflow:hidden; transition:box-shadow .3s; }
  .seg > div > i { display:block; height:100%; width:0; border-radius:99px; background:linear-gradient(90deg,var(--brand),var(--ok)); transition:width .4s ease; }
  .seg > div.done > i { width:100%; }
  /* Cada segmento muestra el color de su propio módulo */
  .seg > div[data-module="personality"] > i { background:linear-gradient(90deg,var(--m-personality),var(--m-personality-2)); }
  .seg > div[data-module="cognitive"]   > i { background:linear-gradient(90deg,var(--m-cognitive),var(--m-cognitive-2)); }
  .seg > div[data-module="emotional"]   > i { background:linear-gradient(90deg,var(--m-emotional),var(--m-emotional-2)); }
  .seg > div[data-module="stealth"]     > i { background:linear-gradient(90deg,var(--m-stealth),var(--m-stealth-2)); }
  .progress { height:8px; background:#0c1126; border-radius:99px; overflow:hidden; }
  #progress-bar { height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--accent-2)); border-radius:99px; transition:background .45s ease; }
  .test-meta { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:10px; }
  .module-tag { font-size:.74rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); transition:color .45s ease; }
  .counter { font-size:.84rem; font-variant-numeric:tabular-nums; }

  .q-card { min-height:280px; position:relative; overflow:hidden; }
  .q-card::before { content:''; position:absolute; left:0; top:0; height:3px; width:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent-2)); opacity:.95; transition:background .45s ease; }

  /* Píldora "cómo responder" — adapta el mensaje al tipo de pregunta */
  .q-type { display:inline-flex; align-items:center; gap:8px; font-size:.72rem; font-weight:800; letter-spacing:.04em;
    text-transform:uppercase; color:var(--accent); background:rgba(var(--accent-rgb),.12);
    border:1px solid rgba(var(--accent-rgb),.35); padding:7px 13px; border-radius:999px; margin:2px 0 16px;
    transition:color .45s ease, background .45s ease, border-color .45s ease; }
  .q-type .qt-ic { font-size:1rem; line-height:1; }

  .q-text { font-size:clamp(1.18rem,3.4vw,1.42rem); font-weight:700; line-height:1.4; margin:2px 0 10px; }
  .q-sub { color:var(--muted); font-size:.92rem; margin-bottom:18px; }

  /* Opciones MCQ / SJT / escenario */
  .options { display:grid; gap:11px; }
  .opt {
    display:flex; align-items:center; gap:13px; text-align:left; width:100%; position:relative;
    background:rgba(255,255,255,.035); border:1.5px solid var(--line); color:var(--ink);
    padding:15px 44px 15px 16px; border-radius:14px; font-weight:500; font-size:1rem; line-height:1.4; min-height:54px;
  }
  .opt:hover { border-color:var(--accent); background:rgba(var(--accent-rgb),.08); transform:translateY(-1px); }
  .opt .key { flex:none; width:32px; height:32px; border-radius:9px; display:grid; place-items:center;
    background:rgba(255,255,255,.06); border:1px solid var(--line); font-weight:800; font-size:.86rem; color:var(--muted); transition:all .2s; }
  .opt.selected { border-color:var(--accent); background:rgba(var(--accent-rgb),.16); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12); }
  .opt.selected .key { background:var(--accent); color:#fff; border-color:var(--accent); }
  .opt.selected::after { content:'✓'; position:absolute; right:15px; top:50%; transform:translateY(-50%);
    color:var(--accent); font-weight:900; font-size:1.05rem; }

  /* Likert */
  .likert-wrap { margin-top:6px; }
  .likert { display:flex; justify-content:space-between; gap:8px; }
  .lk {
    flex:1 1 0; aspect-ratio:1/1; min-width:0; max-width:74px; margin:0 auto;
    border-radius:50%; border:2.5px solid var(--line); background:rgba(255,255,255,.03);
    color:var(--ink); font-weight:800; font-size:1.05rem; display:grid; place-items:center;
  }
  .lk:hover { transform:scale(1.08); }
  .lk.selected { color:#08111f; box-shadow:0 6px 18px rgba(0,0,0,.35); }
  /* Etiqueta viva: muestra el significado de la opción elegida */
  .likert-value { text-align:center; margin-top:16px; font-weight:700; font-size:1.02rem; color:var(--muted);
    min-height:1.4em; transition:color .2s; }
  .likert-anchors { display:flex; justify-content:space-between; gap:10px; margin-top:10px; color:var(--muted); font-size:.78rem; }
  .likert-anchors span:last-child { text-align:right; }

  /* Elección forzada */
  .fc-hint { font-size:.86rem; color:var(--muted); margin:2px 0 14px; }
  .fc-row { display:flex; align-items:stretch; gap:10px; margin-bottom:10px; }
  .fc-statement { flex:1; display:flex; align-items:center; background:rgba(255,255,255,.035);
    border:1.5px solid var(--line); padding:13px 14px; border-radius:12px; font-weight:500; transition:border-color .2s, background .2s; }
  .fc-pick { display:flex; flex-direction:column; gap:6px; flex:none; width:56px; }
  .fc-pick button { flex:1; min-height:36px; font-size:1rem; font-weight:800; border-radius:10px; line-height:1;
    border:1.5px solid var(--line); background:rgba(255,255,255,.03); color:var(--muted); }
  .fc-pick .m:hover { border-color:var(--ok); color:var(--ok); }
  .fc-pick .l:hover { border-color:var(--bad); color:var(--bad); }
  .fc-pick .m.on { background:rgba(51,214,166,.2); color:var(--ok); border-color:var(--ok); }
  .fc-pick .l.on { background:rgba(255,107,125,.18); color:var(--bad); border-color:var(--bad); }
  .fc-row.is-most .fc-statement { border-color:var(--ok); background:rgba(51,214,166,.1); }
  .fc-row.is-least .fc-statement { border-color:var(--bad); background:rgba(255,107,125,.08); }

  .nav { display:flex; justify-content:space-between; gap:12px; margin-top:18px; }

  /* Cargando */
  .loading { padding:54px 24px; }
  .loader { display:flex; gap:8px; justify-content:center; margin-bottom:22px; }
  .loader span { width:14px; height:14px; border-radius:50%; background:var(--brand);
    animation:bounce 1.1s infinite ease-in-out; }
  .loader span:nth-child(2){ background:var(--brand-2); animation-delay:.12s; }
  .loader span:nth-child(3){ background:var(--pink); animation-delay:.24s; }
  .loader span:nth-child(4){ background:var(--ok); animation-delay:.36s; }
  @keyframes bounce { 0%,80%,100%{ transform:translateY(0); opacity:.5; } 40%{ transform:translateY(-16px); opacity:1; } }

  /* ===================== INFORME ===================== */
  .report-hero h1 { font-size:clamp(1.6rem,5vw,2.3rem); font-weight:900; }
  .report-hero .lead { margin-top:12px; }

  .gauges { display:grid; grid-template-columns:repeat(auto-fit,minmax(118px,1fr)); gap:14px; margin-top:22px; }
  .gauge { text-align:center; }
  .gauge svg { width:118px; height:118px; max-width:100%; }
  .gauge .ring-bg { fill:none; stroke:#1c2542; stroke-width:11; }
  .gauge .ring-fg { fill:none; stroke-width:11; stroke-linecap:round; transform:rotate(-90deg); transform-origin:50% 50%; }
  .gauge .g-num { font-size:1.5rem; font-weight:900; }
  .gauge .g-cap { display:block; margin-top:6px; font-size:.82rem; font-weight:600; color:var(--ink-2); }
  .gauge .g-sub { display:block; font-size:.74rem; color:var(--muted); }

  .bars { display:grid; gap:14px; margin-top:6px; }
  .bar-row { display:grid; grid-template-columns:1fr; gap:5px; }
  .bar-head { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .bar-head b { font-weight:700; }
  .bar-head .lvl { font-size:.8rem; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .track { height:13px; background:#0c1126; border-radius:99px; overflow:hidden; border:1px solid var(--line); }
  .track > i { display:block; height:100%; width:0; border-radius:99px; }

  .report-section { margin-top:16px; }
  .report-section h3 { color:#cfe0ff; font-size:1.18rem; margin-bottom:6px; }
  .report-section > .muted { margin-bottom:6px; }
  .bullet { border-left:3px solid var(--brand); padding:4px 0 4px 15px; margin:14px 0; }
  .bullet h4 { font-size:1.02rem; margin-bottom:4px; }
  .bullet p { margin:0; color:var(--ink-2); }
  .interplay { background:linear-gradient(180deg,rgba(154,107,255,.1),rgba(91,140,255,.06));
    border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-top:12px; }
  .interplay p { margin:7px 0; color:var(--ink-2); }

  .badges { display:flex; flex-wrap:wrap; gap:9px; margin:18px 0 2px; }
  .badge { background:rgba(91,140,255,.16); border:1px solid var(--brand); color:#dbe6ff;
    padding:8px 14px; border-radius:999px; font-size:.86rem; font-weight:700; }
  .badge.alt { background:rgba(51,214,166,.14); border-color:var(--ok); color:#c9f6e7; }

  .disclaimer { font-size:.84rem; color:var(--muted); border-top:1px solid var(--line); padding-top:14px; margin-top:8px; }

  /* ============================================================
     INFORME 2.0 — narrativa visual, radares, curva, espectro, PDF
     ============================================================ */
  #report-root { display:flex; flex-direction:column; gap:16px; }
  #report-root .card { margin:0; }
  /* Acento por sección (--sec): define un color de identidad reutilizable */
  #report-root .card[style*="--sec"]::before,
  .report-hero::before { background:linear-gradient(90deg, var(--sec,#5b8cff), transparent 80%); }
  #report-root .card { position:relative; overflow:hidden; }
  #report-root .card::before { content:''; position:absolute; left:0; top:0; height:4px; width:100%;
    background:linear-gradient(90deg, var(--sec,#5b8cff), transparent 78%); opacity:.9; }

  /* ---------- Hero / arquetipo ---------- */
  .hero-top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
  .archetype { display:flex; align-items:center; gap:18px; }
  .arch-emoji { font-size:3.6rem; line-height:1; filter:drop-shadow(0 8px 20px rgba(0,0,0,.45));
    flex:none; width:84px; height:84px; display:grid; place-items:center; border-radius:24px;
    background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.10), rgba(255,255,255,.02));
    border:1px solid var(--line); }
  .arch-klabel { text-transform:uppercase; letter-spacing:.16em; font-size:.7rem; font-weight:800; color:var(--brand); margin-bottom:4px; }
  .arch-name { font-size:clamp(1.6rem,5.2vw,2.4rem); font-weight:900; line-height:1.1;
    background:linear-gradient(90deg,#cfe0ff,#9a6bff 60%,#ff7ab8); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .arch-tagline { color:var(--ink-2); font-weight:600; margin-top:4px; font-size:1.02rem; }
  .arch-blurb { color:var(--ink-2); font-size:1.05rem; margin:16px 0 0; line-height:1.6; }
  .report-hero .lead { margin-top:10px; color:var(--muted); }

  /* ---------- Snapshot (tarjetas escaneables) ---------- */
  .snapshot { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:22px; }
  .snap-tile { position:relative; padding:16px 14px; border-radius:16px; background:rgba(255,255,255,.035);
    border:1px solid var(--line); overflow:hidden; }
  .snap-tile::after { content:''; position:absolute; inset:0 auto 0 0; width:4px; background:var(--sec,#5b8cff); }
  .snap-ic { font-size:1.5rem; line-height:1; }
  .snap-val { font-size:1.2rem; font-weight:900; margin-top:8px; color:#fff; letter-spacing:-.01em; line-height:1.2; overflow-wrap:break-word; }
  .snap-label { font-size:.78rem; color:var(--muted); font-weight:600; margin-top:4px; }
  .snap-cap { font-size:.76rem; color:var(--sec,#9aa8cc); font-weight:700; margin-top:6px; }

  /* ---------- Botón PDF ---------- */
  .pdf-btn { background:linear-gradient(90deg,#5b8cff,#9a6bff); color:#fff; border-radius:12px;
    padding:11px 18px; font-size:.92rem; font-weight:800; box-shadow:0 8px 22px rgba(91,140,255,.35);
    display:inline-flex; align-items:center; gap:8px; white-space:nowrap; }
  .pdf-btn:hover { filter:brightness(1.08); box-shadow:0 12px 28px rgba(91,140,255,.45); }
  .pdf-btn:disabled { opacity:.7; cursor:progress; }
  .pdf-btn.big { padding:15px 22px; font-size:1.02rem; }

  /* ---------- Encabezado de sección ---------- */
  .sec-head { display:flex; align-items:flex-start; gap:14px; margin-bottom:18px; }
  .sec-ic { flex:none; width:48px; height:48px; border-radius:14px; display:grid; place-items:center; font-size:1.5rem;
    background:rgba(var(--accent-rgb),.12); border:1px solid var(--line);
    background:color-mix(in srgb, var(--sec,#5b8cff) 16%, transparent); border-color:color-mix(in srgb, var(--sec,#5b8cff) 32%, transparent); }
  .sec-head h3 { font-size:1.24rem; color:#eaf1ff; }
  .sec-sub { color:var(--muted); font-size:.92rem; margin:5px 0 0; line-height:1.5; }

  /* ---------- Radar (SVG) ---------- */
  .radar-wrap { display:flex; justify-content:center; margin:6px 0 4px; }
  .radar { width:min(380px,100%); height:auto; overflow:visible; }
  .radar-ring { fill:none; stroke:rgba(150,165,205,.16); stroke-width:1; }
  .radar-axis { stroke:rgba(150,165,205,.18); stroke-width:1; }
  .radar-label { font-size:11px; font-weight:700; fill:var(--ink-2); }
  .radar-pct { font-size:10px; font-weight:800; fill:var(--muted); }
  .radar-area { fill-opacity:.22; stroke-width:2.5; stroke-linejoin:round; }
  .radar-dot { stroke:#0b1124; stroke-width:1.5; }
