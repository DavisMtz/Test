<style>
  /* Estilo base, deliberadamente sobrio. El diseño se refinará más adelante. */
  :root {
    --bg: #0b1020; --panel: #141c33; --panel-2:#1b2542; --ink:#e8edf7;
    --muted:#9fb0d0; --brand:#5b8cff; --brand-2:#9a6bff; --ok:#33d6a6; --line:#2a375d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 20% -10%, #1a2550 0%, var(--bg) 55%);
    color: var(--ink); min-height: 100vh;
  }
  #app { max-width: 760px; margin: 0 auto; padding: 24px 16px 64px; }
  .screen { display: none; }
  .screen.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .card {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--line); border-radius: 16px; padding: 24px; margin: 16px 0;
    box-shadow: 0 10px 40px rgba(0,0,0,.35);
  }
  .center { text-align: center; }
  h1 { font-size: 1.6rem; margin: 0 0 8px; }
  h2 { margin: 0 0 8px; }
  .lead { font-size: 1.05rem; color: var(--ink); }
  .muted { color: var(--muted); }
  .small { font-size: .85rem; }

  .frameworks { list-style: none; padding: 0; margin: 16px 0; display: grid; gap: 8px; }
  .frameworks li { background: rgba(255,255,255,.03); border:1px solid var(--line); padding:10px 12px; border-radius:10px; font-size:.92rem; }

  .form-grid { display: grid; grid-template-columns: 1fr 100px 1fr; gap: 12px; margin: 16px 0; }
  label { display: flex; flex-direction: column; gap: 6px; font-size: .85rem; color: var(--muted); }
  input, select {
    background: #0e1530; border: 1px solid var(--line); color: var(--ink);
    border-radius: 10px; padding: 10px 12px; font-size: 1rem;
  }
  input:focus, select:focus { outline: 2px solid var(--brand); }

  button {
    cursor: pointer; border: none; border-radius: 12px; padding: 12px 20px;
    font-size: 1rem; font-weight: 600; transition: transform .08s ease, filter .2s ease;
  }
  button:active { transform: translateY(1px); }
  .primary { background: linear-gradient(90deg, var(--brand), var(--brand-2)); color: white; }
  .primary:hover { filter: brightness(1.08); }
  .ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .ghost:disabled { opacity: .4; cursor: not-allowed; }

  .progress { height: 8px; background: #0e1530; border-radius: 99px; overflow: hidden; margin: 8px 0 4px; }
  #progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--brand), var(--ok)); transition: width .3s ease; }
  .module-tag { font-size: .8rem; letter-spacing: .08em; text-transform: uppercase; color: var(--brand); margin: 8px 2px; font-weight: 700; }

  .q-text { font-size: 1.2rem; line-height: 1.5; margin: 4px 0 18px; }
  .q-sub { color: var(--muted); font-size: .9rem; margin-bottom: 14px; }

  .options { display: grid; gap: 10px; }
  .opt {
    text-align: left; background: rgba(255,255,255,.03); border: 1px solid var(--line);
    color: var(--ink); padding: 14px 16px; border-radius: 12px; font-weight: 500; width: 100%;
  }
  .opt:hover { border-color: var(--brand); }
  .opt.selected { border-color: var(--brand); background: rgba(91,140,255,.16); }
  .opt.most { border-color: var(--ok); background: rgba(51,214,166,.16); }
  .opt.least { border-color: #ff7a7a; background: rgba(255,122,122,.14); }

  .likert { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 8px; }
  .likert.seven { grid-template-columns: repeat(7, 1fr); }
  .likert button { padding: 16px 4px; font-size: .95rem; }
  .likert-anchors { display: flex; justify-content: space-between; color: var(--muted); font-size: .78rem; margin-top: 8px; }

  .fc-hint { font-size:.82rem; color:var(--muted); margin: 6px 0 12px; }
  .fc-row { display:flex; align-items:center; gap:8px; }
  .fc-pick { display:flex; gap:6px; }
  .fc-pick button { padding:8px 10px; font-size:.8rem; border-radius:8px; border:1px solid var(--line); background:transparent; color:var(--muted); }
  .fc-pick button.on-most { background: rgba(51,214,166,.2); color:var(--ok); border-color:var(--ok); }
  .fc-pick button.on-least { background: rgba(255,122,122,.2); color:#ff9a9a; border-color:#ff7a7a; }
  .fc-statement { flex:1; background: rgba(255,255,255,.03); border:1px solid var(--line); padding:12px; border-radius:10px; }

  .nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 12px; }

  .spinner { width: 44px; height: 44px; border: 4px solid var(--line); border-top-color: var(--brand);
    border-radius: 50%; margin: 0 auto 16px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Informe */
  .report-section { margin-bottom: 10px; }
  .report-section h3 { color: var(--brand); margin: 0 0 6px; }
  .bullet { border-left: 3px solid var(--brand); padding: 8px 0 8px 14px; margin: 12px 0; }
  .bullet h4 { margin: 0 0 4px; font-size: 1rem; }
  .bullet p { margin: 0; color: var(--ink); line-height: 1.5; }
  .interplay { background: rgba(154,107,255,.08); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-top:10px; }
  .interplay p { margin: 6px 0; }
  .badges { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
  .badge { background: rgba(91,140,255,.16); border:1px solid var(--brand); color:#cfe0ff; padding:6px 12px; border-radius:99px; font-size:.85rem; }
  .meter { height:10px; background:#0e1530; border-radius:99px; overflow:hidden; margin:6px 0 2px; }
  .meter > div { height:100%; background: linear-gradient(90deg,var(--brand),var(--ok)); }
  .disclaimer { font-size:.82rem; color:var(--muted); border-top:1px solid var(--line); padding-top:12px; margin-top:16px; }

  @media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
    .likert { grid-template-columns: repeat(5, 1fr); }
  }
</style>
