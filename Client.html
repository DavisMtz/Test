<script>
/* =====================================================================
   Cliente — wizard interactivo con animaciones GSAP 3.13.
   Lógica de datos (cola de ítems, respuestas, tiempos, envío) intacta;
   se añade: etapas por módulo, atajos de teclado, transiciones y un
   dashboard animado de resultados. Degrada con elegancia si GSAP falla.
   ===================================================================== */
(function () {
  'use strict';

  var GS = (typeof gsap !== 'undefined') ? gsap : null;

  var STATE = {
    instrument:null, queue:[], index:0,
    responses:{}, rt:{}, itemShownAt:0,
    participant:{}, startedAt:0,
    introduced:{}, currentModule:null,
    activeScreen:'welcome', pendingModule:null
  };

  var STAGES = {
    personality:{ n:1, icon:'🧭', title:'Cómo eres',
      sub:'Rasgos de personalidad (HEXACO / Big Five). No hay respuestas correctas: responde con sinceridad.' },
    cognitive:{ n:2, icon:'🧠', title:'Cómo piensas',
      sub:'Retos de razonamiento y conocimiento. Tómate tu tiempo y elige la mejor opción.' },
    emotional:{ n:3, icon:'💗', title:'Cómo sientes',
      sub:'Tu mundo emocional: cómo te percibes y cómo resuelves situaciones reales.' },
    stealth:{ n:4, icon:'🎮', title:'Cómo decides',
      sub:'Escenarios reales. Elige lo que harías de verdad; también observamos tu estilo de decisión.' }
  };
  var MODULE_LABEL = {
    personality:'Cómo eres · Personalidad', cognitive:'Cómo piensas · Cognición',
    emotional:'Cómo sientes · Emoción', stealth:'Cómo decides · Decisión'
  };
  var MODULE_ORDER = ['personality','cognitive','emotional','stealth'];

  // La interfaz indica, por tipo de respuesta, CÓMO contestar.
  var TYPE_HINT = {
    likert:        { ic:'⟷', label:'Indica tu nivel de acuerdo' },
    mcq:           { ic:'◎', label:'Elige la respuesta correcta' },
    sjt:           { ic:'★', label:'Elige la opción más eficaz' },
    scenario:      { ic:'⚑', label:'Elige qué harías de verdad' },
    forced_choice: { ic:'±', label:'Marca la más y la menos parecida' }
  };
  // Etiquetas de significado por punto de la escala Likert (clarifica la elección).
  var LIKERT_LABELS = {
    5:['Totalmente en desacuerdo','En desacuerdo','Neutral','De acuerdo','Totalmente de acuerdo'],
    7:['Totalmente en desacuerdo','En desacuerdo','Algo en desacuerdo','Neutral','Algo de acuerdo','De acuerdo','Totalmente de acuerdo']
  };
  function likertLabel(item,val){
    var arr=LIKERT_LABELS[item.scale];
    if(arr && arr[val-1]) return arr[val-1];
    var a=item.anchors||[]; return a[val-1] || ('Opción '+val);
  }
  // Aplica la identidad de color del módulo a toda la interfaz.
  function setModule(m){ document.body.dataset.module = m || ''; }

  function $(id){ return document.getElementById(id); }

  /* ---------------- Animación (con degradado elegante) ---------------- */
  function gFrom(t,v){ if(GS) GS.from(t,v); }
  function gTo(t,v){ if(GS) GS.to(t,v); }
  function countUp(el, to, fmt){
    fmt = fmt || function(n){ return n; };
    if(!GS){ el.textContent = fmt(to); return; }
    var o={v:0}; GS.to(o,{ v:to, duration:1.1, ease:'power2.out',
      onUpdate:function(){ el.textContent = fmt(Math.round(o.v)); } });
  }

  function show(screen){
    STATE.activeScreen = screen;
    ['welcome','stage','test','loading','report'].forEach(function(s){
      $('screen-'+s).classList.toggle('active', s===screen);
    });
    window.scrollTo(0,0);
  }

  /* ---------------------------- Arranque ---------------------------- */
  document.addEventListener('DOMContentLoaded', function(){
    $('btn-start').addEventListener('click', startTest);
    $('btn-stage').addEventListener('click', stageContinue);
    $('btn-next').addEventListener('click', next);
    $('btn-prev').addEventListener('click', prev);
    document.addEventListener('keydown', onKey);

    // Cada chip de bienvenida luce el color de su módulo (refuerza la identidad).
    Array.prototype.forEach.call(document.querySelectorAll('.chip[data-c]'), function(c){
      var col = c.getAttribute('data-c');
      c.style.borderColor = col;
      c.style.background = 'color-mix(in srgb, '+col+' 14%, transparent)';
      c.style.boxShadow = '0 0 0 1px color-mix(in srgb, '+col+' 22%, transparent) inset';
    });

    if(GS){
      GS.to('.o1',{ x:50, y:40, duration:9, repeat:-1, yoyo:true, ease:'sine.inOut' });
      GS.to('.o2',{ x:-60, y:30, duration:11, repeat:-1, yoyo:true, ease:'sine.inOut' });
      GS.to('.o3',{ x:40, y:-30, duration:10, repeat:-1, yoyo:true, ease:'sine.inOut' });
      GS.from('#screen-welcome .card > *',{ y:24, opacity:0, duration:.6, stagger:.07, ease:'power3.out', delay:.1 });
    }

    google.script.run
      .withSuccessHandler(function(inst){ STATE.instrument = inst; })
      .withFailureHandler(function(e){ alert('No se pudo cargar el instrumento: '+e); })
      .getInstrumentForClient();
  });

  function startTest(){
    if(!STATE.instrument){ alert('Cargando aún, intenta de nuevo en un momento.'); return; }
    STATE.participant = {
      name:($('in-name').value||'').trim() || 'Participante',
      age:$('in-age').value||'', gender:$('in-gender').value||''
    };
    STATE.queue = STATE.instrument.items.slice().sort(function(a,b){
      return MODULE_ORDER.indexOf(a.module) - MODULE_ORDER.indexOf(b.module);
    });
    buildSegments();
    STATE.index = 0; STATE.startedAt = Date.now();
    goCurrent();
  }

  function buildSegments(){
    var counts = {};
    MODULE_ORDER.forEach(function(m){ counts[m]=0; });
    STATE.queue.forEach(function(it){ counts[it.module]++; });
    var seg = $('segments'); seg.innerHTML='';
    MODULE_ORDER.forEach(function(m){
      var d=document.createElement('div'); d.dataset.module=m;
      d.innerHTML='<i></i>'; seg.appendChild(d);
    });
  }

  /* ----------------------- Navegación + etapas ---------------------- */
  function goCurrent(){
    var item = STATE.queue[STATE.index];
    STATE.currentModule = item.module;
    if(!STATE.introduced[item.module]){
      STATE.introduced[item.module] = true;
      STATE.pendingModule = item.module;
      showStage(item.module);
    } else {
      showQuestion();
    }
  }

  function showStage(module){
    var s = STAGES[module];
    setModule(module);
    $('stage-icon').textContent = s.icon;
    $('stage-kicker').textContent = 'Etapa '+s.n+' de 4';
    $('stage-title').textContent = s.title;
    $('stage-sub').textContent = s.sub;
    show('stage');
    gFrom('#stage-icon',{ scale:0, rotate:-30, duration:.7, ease:'back.out(1.7)' });
    gFrom('#screen-stage .stage-kicker, #screen-stage .stage-title, #screen-stage .stage-sub, #btn-stage',
      { y:22, opacity:0, duration:.5, stagger:.08, ease:'power3.out', delay:.15 });
  }
  function stageContinue(){ show('test'); showQuestion(); }

  function showQuestion(){
    var item = STATE.queue[STATE.index];
    if(!item) return;
    setModule(item.module);
    STATE.itemShownAt = Date.now();

    $('module-tag').textContent = MODULE_LABEL[item.module] || item.module;
    $('counter').textContent = (STATE.index+1)+' / '+STATE.queue.length;
    updateProgress();
    $('btn-prev').disabled = STATE.index===0;
    $('btn-next').textContent = (STATE.index===STATE.queue.length-1) ? 'Finalizar ✓' : 'Siguiente →';

    var card = $('question-card');
    card.innerHTML='';
    var t=item.type;

    // Píldora adaptativa: comunica el tipo de respuesta que se espera.
    var hint=TYPE_HINT[t];
    if(hint){
      var pill=document.createElement('div'); pill.className='q-type';
      pill.innerHTML='<span class="qt-ic" aria-hidden="true">'+esc(hint.ic)+'</span><span>'+esc(hint.label)+'</span>';
      card.appendChild(pill);
    }

    if(t==='likert') renderLikert(card,item);
    else if(t==='mcq' || t==='sjt' || t==='scenario') renderMcq(card,item);
    else if(t==='forced_choice') renderForcedChoice(card,item);

    gFrom('#question-card > *',{ y:18, opacity:0, duration:.42, stagger:.05, ease:'power3.out' });
  }

  function updateProgress(){
    var pct = (STATE.index)/STATE.queue.length*100;
    if(GS) GS.to('#progress-bar',{ width:pct+'%', duration:.5, ease:'power2.out' });
    else $('progress-bar').style.width = pct+'%';
    // Segmentos por módulo
    var doneModules = {};
    for(var i=0;i<STATE.index;i++) doneModules[STATE.queue[i].module]=true;
    var curMod = STATE.queue[STATE.index].module;
    document.querySelectorAll('#segments > div').forEach(function(d){
      var m=d.dataset.module;
      var passed = MODULE_ORDER.indexOf(m) < MODULE_ORDER.indexOf(curMod);
      d.classList.toggle('done', passed);
      var fill = d.querySelector('i');
      if(m===curMod){
        // progreso dentro del módulo actual
        var inMod = STATE.queue.filter(function(x){return x.module===m;}).length;
        var beforeMod = STATE.queue.findIndex(function(x){return x.module===m;});
        var pos = STATE.index - beforeMod;
        fill.style.width = Math.round(pos/inMod*100)+'%';
      } else {
        fill.style.width = passed ? '100%' : '0%';
      }
    });
  }

  /* ----------------------------- Render ----------------------------- */
  function header(card,item,sub){
    var h=document.createElement('div'); h.className='q-text';
    h.textContent=item.text||item.prompt||''; card.appendChild(h);
    if(sub){ var s=document.createElement('div'); s.className='q-sub'; s.textContent=sub; card.appendChild(s); }
  }

  function renderLikert(card,item){
    header(card,item);
    var wrap=document.createElement('div'); wrap.className='likert-wrap';
    var row=document.createElement('div'); row.className='likert'; row.setAttribute('role','radiogroup');
    var current=STATE.responses[item.id];
    for(var v=1; v<=item.scale; v++){
      (function(val){
        var hue = (val-1)/(item.scale-1)*128; // rojo(0) -> verde(128)
        var color = 'hsl('+hue+',72%,55%)';
        var b=document.createElement('button');
        b.className='lk'+(current===val?' selected':'');
        b.textContent=val;
        b.style.borderColor=color;
        b.style.color = current===val ? '#08111f' : color;
        if(current===val) b.style.background=color;
        b.setAttribute('role','radio');
        b.setAttribute('aria-checked', current===val ? 'true':'false');
        b.setAttribute('aria-label', val+' — '+likertLabel(item,val));
        b.onclick=function(){ choose(item.id,val); };
        row.appendChild(b);
      })(v);
    }
    wrap.appendChild(row);
    // Etiqueta viva con el significado de la opción seleccionada.
    var live=document.createElement('div'); live.className='likert-value'; live.setAttribute('aria-live','polite');
    if(current){ live.textContent=likertLabel(item,current); live.style.color='hsl('+((current-1)/(item.scale-1)*128)+',72%,62%)'; }
    else { live.textContent='Toca un número para responder'; }
    wrap.appendChild(live);
    var a=item.anchors||[];
    var anchors=document.createElement('div'); anchors.className='likert-anchors';
    anchors.innerHTML='<span>'+esc(a[0]||likertLabel(item,1))+'</span><span>'+esc(a[a.length-1]||likertLabel(item,item.scale))+'</span>';
    wrap.appendChild(anchors);
    card.appendChild(wrap);
  }

  function renderMcq(card,item){
    header(card,item);
    var wrap=document.createElement('div'); wrap.className='options'; wrap.setAttribute('role','radiogroup');
    var current=STATE.responses[item.id];
    var letters='ABCDEFGH';
    item.options.forEach(function(opt,i){
      var b=document.createElement('button');
      b.className='opt'+(current===i?' selected':'');
      b.setAttribute('role','radio');
      b.setAttribute('aria-checked', current===i ? 'true':'false');
      b.innerHTML='<span class="key">'+letters[i]+'</span><span>'+esc(opt.text)+'</span>';
      b.onclick=function(){ choose(item.id,i); };
      wrap.appendChild(b);
    });
    card.appendChild(wrap);
  }

  function renderForcedChoice(card,item){
    header(card,item);
    var hint=document.createElement('div'); hint.className='fc-hint';
    hint.textContent='Marca «+» en la frase MÁS parecida a ti y «–» en la MENOS parecida.';
    card.appendChild(hint);
    var resp=STATE.responses[item.id]||{most:null,least:null};
    var wrap=document.createElement('div');
    item.options.forEach(function(opt,i){
      var row=document.createElement('div');
      row.className='fc-row'+(resp.most===i?' is-most':'')+(resp.least===i?' is-least':'');
      var pick=document.createElement('div'); pick.className='fc-pick';
      var mBtn=document.createElement('button'); mBtn.className='m'+(resp.most===i?' on':''); mBtn.textContent='+';
      mBtn.title='Más parecida a mí';
      mBtn.onclick=function(){ resp.most=(resp.most===i?null:i); if(resp.least===i)resp.least=null; STATE.responses[item.id]=resp; showQuestion(); };
      var lBtn=document.createElement('button'); lBtn.className='l'+(resp.least===i?' on':''); lBtn.textContent='–';
      lBtn.title='Menos parecida a mí';
      lBtn.onclick=function(){ resp.least=(resp.least===i?null:i); if(resp.most===i)resp.most=null; STATE.responses[item.id]=resp; showQuestion(); };
      pick.appendChild(mBtn); pick.appendChild(lBtn);
      var st=document.createElement('div'); st.className='fc-statement'; st.textContent=opt.text;
      row.appendChild(pick); row.appendChild(st); wrap.appendChild(row);
    });
    card.appendChild(wrap);
  }

  /* --------------------------- Interacción -------------------------- */
  function choose(itemId,value){
    STATE.responses[itemId]=value; recordRt(itemId);
    var item=STATE.queue[STATE.index];
    if(item.type!=='forced_choice'){
      paintSelection(item, value); // refleja la selección de inmediato
      var node = $('question-card').querySelector('.selected');
      if(node && GS){ GS.fromTo(node,{scale:.9},{scale:1,duration:.28,ease:'back.out(2)'}); }
      setTimeout(next, 240);
    } else { showQuestion(); }
  }

  // Marca visualmente la opción elegida sin re-animar toda la tarjeta.
  function paintSelection(item, value){
    var card=$('question-card');
    if(item.type==='likert'){
      var btns=card.querySelectorAll('.lk');
      btns.forEach(function(b,idx){
        var val=idx+1, hue=(val-1)/(item.scale-1)*128, color='hsl('+hue+',72%,55%)';
        var on=(val===value);
        b.classList.toggle('selected',on);
        b.setAttribute('aria-checked', on ? 'true':'false');
        b.style.background=on?color:'';
        b.style.color=on?'#08111f':color;
      });
      var live=card.querySelector('.likert-value');
      if(live){ live.textContent=likertLabel(item,value); live.style.color='hsl('+((value-1)/(item.scale-1)*128)+',72%,62%)'; }
    } else {
      var opts=card.querySelectorAll('.opt');
      opts.forEach(function(b,idx){
        var on=(idx===value);
        b.classList.toggle('selected', on);
        b.setAttribute('aria-checked', on ? 'true':'false');
      });
    }
  }

  function recordRt(itemId){
    if(STATE.itemShownAt && STATE.rt[itemId]==null){
      STATE.rt[itemId]=Date.now()-STATE.itemShownAt;
    }
  }

  function isAnswered(item){
    var r=STATE.responses[item.id];
    if(item.type==='forced_choice') return r && r.most!=null && r.least!=null;
    return r!=null;
  }

  function next(){
    var item=STATE.queue[STATE.index];
    if(!isAnswered(item)){ flashRequired(); return; }
    recordRt(item.id);
    if(STATE.index<STATE.queue.length-1){ STATE.index++; goCurrent(); }
    else submit();
  }
  function prev(){ if(STATE.index>0){ STATE.index--; STATE.introduced[STATE.queue[STATE.index].module]=true; showQuestion(); } }

  function flashRequired(){
    var card=$('question-card');
    if(GS) GS.fromTo(card,{x:-8},{x:0,duration:.4,ease:'elastic.out(1,0.4)'});
    card.style.outline='2px solid var(--bad)';
    setTimeout(function(){ card.style.outline='none'; }, 500);
  }

  /* ------------------------------ Teclado --------------------------- */
  function onKey(e){
    if(STATE.activeScreen==='stage'){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); stageContinue(); } return; }
    if(STATE.activeScreen==='welcome'){ if(e.key==='Enter') startTest(); return; }
    if(STATE.activeScreen!=='test') return;
    var item=STATE.queue[STATE.index];
    if(!item) return;
    if(item.type==='likert'){ var n=parseInt(e.key,10); if(n>=1&&n<=item.scale){ choose(item.id,n); return; } }
    else if(item.type!=='forced_choice'){ var i='abcdefgh'.indexOf((e.key||'').toLowerCase()); if(i>=0&&i<item.options.length){ choose(item.id,i); return; } }
    if(e.key==='Enter') next();
    else if(e.key==='Backspace'){ e.preventDefault(); prev(); }
  }

  /* ------------------------------ Envío ----------------------------- */
  function submit(){
    if(GS) GS.to('#progress-bar',{ width:'100%', duration:.4 });
    show('loading');
    var payload={ participant:STATE.participant, responses:STATE.responses,
      meta:{ rt:STATE.rt, durationMs:Date.now()-STATE.startedAt } };
    google.script.run
      .withSuccessHandler(onResult)
      .withFailureHandler(function(e){ show('test'); alert('Error al procesar: '+e); })
      .submitAssessment(payload);
  }

  function onResult(res){
    if(res==null){ show('test'); alert('El servidor no devolvió respuesta. Vuelve a intentar Finalizar; si persiste, recarga la página. (Tus datos pudieron guardarse igualmente.)'); return; }
    if(!res.ok){ show('test'); alert('No se pudo generar el informe: '+(res.error||'error desconocido')); return; }
    renderReport(res);
    show('report');
  }

  /* =====================================================================
     INFORME 2.0 — relato visual y escaneable.
     Estructura: arquetipo + titular → snapshot → fortalezas/crecimiento →
     personalidad (radar) → cognitivo (curva de campana) → emocional (radar)
     → decisión (espectro) → lectura integrada → recomendaciones → PDF.
     Lo visual y el "qué significa" siempre a la vista; el detalle técnico se
     despliega bajo demanda. Exportación a PDF de un clic (html2pdf.js).
     ===================================================================== */
  var SVGNS='http://www.w3.org/2000/svg';
  // Nombres cortos para los ejes del radar (los largos no caben bien).
  var SHORT_TRAIT={ 'Honestidad-Humildad':'Honestidad', 'Emocionalidad':'Emocionalidad',
    'Extraversión':'Extraversión', 'Amabilidad':'Amabilidad', 'Responsabilidad':'Responsab.', 'Apertura':'Apertura' };
  function shortTrait(n){ return SHORT_TRAIT[n]||n; }
  function cap(s){ return s?String(s).charAt(0).toUpperCase()+String(s).slice(1):s; }
  function svg(name,attrs){ var e=document.createElementNS(SVGNS,name); for(var k in attrs) e.setAttribute(k,attrs[k]); return e; }

  function renderReport(res){
    setModule(''); // el informe combina los colores de todos los módulos
    var r=res.report, m=r.metrics||{}, root=$('report-root');
    root.innerHTML='';

    root.appendChild(buildHero(r));
    if(r.highlights) root.appendChild(buildHighlightsCard(r.highlights));

    var S={}; (r.sections||[]).forEach(function(sec){ S[sec.id]=sec; });
    if(m.hexaco)    root.appendChild(buildPersonalityCard(S.personality, m));
    if(m.cognitive) root.appendChild(buildCognitiveCard(S.cognitive, m));
    if(m.eiTrait)   root.appendChild(buildEmotionalCard(S.emotional, m));
    if(S.stealth)   root.appendChild(buildDecisionCard(S.stealth, m));
    if(S.integrative)     root.appendChild(buildTextCard(S.integrative, '🧩', '#5b8cff'));
    if(S.recommendations) root.appendChild(buildRecommendationsCard(S.recommendations));
    root.appendChild(buildFooter(res, r));

    // Enlaces de acción
    Array.prototype.forEach.call(document.querySelectorAll('.pdf-btn'), function(b){ b.onclick=downloadPdf; });
    var rb=$('btn-restart'); if(rb) rb.onclick=function(){ location.reload(); };
    var tb=$('btn-top');     if(tb) tb.onclick=function(){ window.scrollTo({top:0,behavior:'smooth'}); };

    animateReport(root);
  }

  /* ----------------------------- Hero ----------------------------- */
  function buildHero(r){
    var a=r.archetype||{}, card=document.createElement('div'); card.className='card report-hero';
    card.style.setProperty('--sec','#9a6bff');
    var tiles=(r.snapshot||[]).map(snapTile).join('');
    card.innerHTML=
      '<div class="hero-top no-pdf">'+
        '<span class="kicker">Tu informe · listo ✓</span>'+
        '<button class="pdf-btn" type="button">📄 Descargar PDF</button>'+
      '</div>'+
      '<div class="archetype">'+
        '<div class="arch-emoji">'+esc(a.emoji||'🧠')+'</div>'+
        '<div class="arch-meta">'+
          '<div class="arch-klabel">Tu arquetipo</div>'+
          '<h1 class="arch-name">'+esc(a.name||r.title||'Tu perfil')+'</h1>'+
          (a.tagline?'<div class="arch-tagline">'+esc(a.tagline)+'</div>':'')+
        '</div>'+
      '</div>'+
      (a.blurb?'<p class="arch-blurb">'+esc(a.blurb)+'</p>':'')+
      (r.headline?'<p class="lead">'+esc(r.headline)+'</p>':'')+
      (tiles?'<div class="snapshot">'+tiles+'</div>':'');
    return card;
  }
  function snapTile(t){
    return '<div class="snap-tile" style="--sec:'+(t.color||'#5b8cff')+'">'+
      '<div class="snap-ic">'+esc(t.icon||'•')+'</div>'+
      '<div class="snap-val">'+esc(t.value)+'</div>'+
      '<div class="snap-label">'+esc(t.label)+'</div>'+
      (t.caption?'<div class="snap-cap">'+esc(t.caption)+'</div>':'')+
    '</div>';
  }

  /* ----------------- Fortalezas / crecimiento --------------------- */
  function buildHighlightsCard(h){
    var card=document.createElement('div'); card.className='card'; card.style.setProperty('--sec','#33d6a6');
    card.appendChild(secHeadEl('⭐','Lo esencial de ti',
      'Tus mayores fortalezas y las zonas con más margen de crecimiento.','#33d6a6'));
    var grid=document.createElement('div'); grid.className='insight-grid';
    (h.strengths||[]).forEach(function(s){ grid.appendChild(insightCard(s,'strength')); });
    (h.growth||[]).forEach(function(s){ grid.appendChild(insightCard(s,'grow')); });
    card.appendChild(grid);
    return card;
  }
  function insightCard(s,kind){
    var el=document.createElement('div'); el.className='insight-card '+kind;
    el.innerHTML='<div class="ins-top"><span class="ins-ic">'+esc(s.icon||'')+'</span><b>'+esc(s.title)+'</b>'+
      (s.sub?'<span class="ins-sub">'+esc(s.sub)+'</span>':'')+'</div>'+
      '<p>'+esc(s.text||'')+'</p>';
    return el;
  }

  /* ----------------------- Personalidad --------------------------- */
  function buildPersonalityCard(sec, m){
    var card=document.createElement('div'); card.className='card'; card.style.setProperty('--sec','#7c9cff');
    card.appendChild(secHeadEl('🧭', sec?sec.title:'Cómo eres', sec?sec.intro:'', '#7c9cff'));
    card.appendChild(makeRadar(m.hexaco.map(function(h){
      return { label:shortTrait(h.name), value:h.percentile, color:h.color };
    }), '#7c9cff'));
    var chips=document.createElement('div'); chips.className='lvl-chips';
    m.hexaco.forEach(function(h){ chips.appendChild(chipEl(h.name, h.level, h.percentile, h.color)); });
    card.appendChild(chips);
    appendInterplay(card, sec, 'Cómo se combinan tus rasgos');
    appendDetail(card, sec);
    return card;
  }

  /* ------------------------- Cognitivo ---------------------------- */
  function buildCognitiveCard(sec, m){
    var card=document.createElement('div'); card.className='card'; card.style.setProperty('--sec','#33d6a6');
    card.appendChild(secHeadEl('🧠', sec?sec.title:'Cómo piensas', sec?sec.intro:'', '#33d6a6'));
    card.appendChild(makeBellCurve(m.cognitive));
    var stats=document.createElement('div'); stats.className='stat-row';
    m.cognitive.forEach(function(c){ stats.appendChild(statChip(c)); });
    card.appendChild(stats);
    appendInterplay(card, sec, 'Cómo leer tu perfil cognitivo');
    appendDetail(card, sec);
    return card;
  }
  function statChip(c){
    var el=document.createElement('div'); el.className='stat-chip'; el.style.setProperty('--c',c.color||'#33d6a6');
    el.innerHTML='<div class="st-key">'+esc(c.label.replace(/\s*\([^)]*\)/,''))+'</div>'+
      '<div class="st-val">'+esc(String(c.iq))+'</div>'+
      '<div class="st-sub">CI · P'+c.percentile+' · '+esc(c.level)+'</div>';
    return el;
  }

  /* -------------------------- Emocional --------------------------- */
  function buildEmotionalCard(sec, m){
    var card=document.createElement('div'); card.className='card'; card.style.setProperty('--sec','#ff7ab8');
    card.appendChild(secHeadEl('💗', sec?sec.title:'Cómo sientes', sec?sec.intro:'', '#ff7ab8'));
    card.appendChild(makeRadar(m.eiTrait.map(function(f){
      return { label:f.name, value:f.percentile, color:'#ff7ab8' };
    }), '#ff7ab8'));
    var chips=document.createElement('div'); chips.className='lvl-chips';
    m.eiTrait.forEach(function(f){ chips.appendChild(chipEl(f.name, f.level, f.percentile, '#ff7ab8')); });
    card.appendChild(chips);
    if(m.eiAbility && m.eiAbility.length){
      var ab=document.createElement('div'); ab.className='takeaways';
      ab.innerHTML='<div class="ta-title">Habilidad emocional en práctica (MSCEIT'+
        (m.eiAbilityGlobal!=null?' · '+m.eiAbilityGlobal+'/100':'')+')</div>';
      ab.appendChild(makeBars(m.eiAbility.map(function(b){
        return { label:b.name, value:b.score100, color:'#ff7ab8' };
      }), true));
      card.appendChild(ab);
    }
    appendInterplay(card, sec, 'Autopercepción frente a desempeño real');
    appendDetail(card, sec);
    return card;
  }

  /* --------------------------- Decisión --------------------------- */
  function buildDecisionCard(sec, m){
    var card=document.createElement('div'); card.className='card'; card.style.setProperty('--sec','#ffb648');
    card.appendChild(secHeadEl('🎮', sec?sec.title:'Cómo decides', sec?sec.intro:'', '#ffb648'));
    var dec=m.decision||{};
    card.appendChild(makeSpectrum(dec.style, dec.avgMs));
    appendInterplay(card, sec, 'Señales que dejaron tus decisiones');
    appendDetail(card, sec);
    return card;
  }
  function makeSpectrum(style, avgMs){
    var wrap=document.createElement('div'); wrap.className='spectrum';
    var pos = style==='impulsivo'?16:(style==='reflexivo'?84:50);
    if(avgMs){ var p=(avgMs-1500)/(12000-1500); pos=Math.round(Math.max(0.06,Math.min(0.94,p))*100); }
    wrap.innerHTML=
      '<div class="spec-labels"><span>⚡ Impulsivo</span><span>⚖️ Equilibrado</span><span>🧩 Reflexivo</span></div>'+
      '<div class="spec-track"><div class="spec-fill" style="width:'+pos+'%"></div>'+
        '<div class="spec-marker" style="left:'+pos+'%"><span>'+esc(cap(style||'—'))+'</span></div></div>'+
      (avgMs?'<div class="spec-cap">Tiempo medio por reto ≈ '+Math.round(avgMs/1000)+' s</div>':'');
    return wrap;
  }

  /* --------------- Tarjetas de texto / recomendaciones ------------ */
  function buildTextCard(sec, icon, color){
    var card=document.createElement('div'); card.className='card'; card.style.setProperty('--sec',color);
    card.appendChild(secHeadEl(icon, sec.title, sec.intro, color));
    appendInterplay(card, sec, null);
    appendDetail(card, sec);
    return card;
  }
  function buildRecommendationsCard(sec){
    var card=document.createElement('div'); card.className='card'; card.style.setProperty('--sec','#9a6bff');
    card.appendChild(secHeadEl('🎯', sec.title, sec.intro, '#9a6bff'));
    var list=document.createElement('div'); list.className='reco-list';
    (sec.interplay||[]).forEach(function(p){
      var d=document.createElement('div'); d.className='reco';
      d.innerHTML='<span class="reco-ic">✓</span><p>'+esc(p)+'</p>'; list.appendChild(d);
    });
    card.appendChild(list);
    return card;
  }

  /* ----------------------------- Pie ------------------------------ */
  function buildFooter(res, r){
    var card=document.createElement('div'); card.className='card report-foot';
    card.innerHTML=
      '<div class="foot-cta no-pdf">'+
        '<button class="pdf-btn big" type="button">📄 Descargar informe en PDF</button>'+
        '<button class="ghost" id="btn-restart" type="button">↺ Hacer de nuevo</button>'+
        '<button class="ghost" id="btn-top" type="button">↑ Arriba</button>'+
      '</div>'+
      '<p class="disclaimer">'+esc(r.disclaimer)+'</p>'+
      (res.recordId?'<p class="small muted">Registro guardado de forma anónima (ID '+esc(res.recordId)+').</p>':'');
    return card;
  }

  /* ----------------------- Bloques reutilizables ------------------ */
  function secHeadEl(icon, title, sub, color){
    var h=document.createElement('div'); h.className='sec-head'; if(color) h.style.setProperty('--sec',color);
    h.innerHTML='<div class="sec-ic">'+esc(icon)+'</div><div><h3>'+esc(title||'')+'</h3>'+
      (sub?'<p class="sec-sub">'+esc(sub)+'</p>':'')+'</div>';
    return h;
  }
  function chipEl(name, level, v, color){
    var c=document.createElement('div'); c.className='lvl-chip'; c.style.setProperty('--c',color||'#5b8cff');
    c.innerHTML='<span class="lc-dot"></span><b>'+esc(name)+'</b><span class="lc-meta">'+esc(level)+' · P'+v+'</span>';
    return c;
  }
  function appendInterplay(card, sec, title){
    if(!sec || !sec.interplay || !sec.interplay.length) return;
    var box=document.createElement('div'); box.className='takeaways';
    if(title) box.innerHTML='<div class="ta-title">'+esc(title)+'</div>';
    sec.interplay.forEach(function(p){
      var d=document.createElement('div'); d.className='takeaway';
      d.innerHTML='<span class="ta-ic">💡</span><p>'+esc(p)+'</p>'; box.appendChild(d);
    });
    card.appendChild(box);
  }
  function appendDetail(card, sec){
    if(!sec || !sec.bullets || !sec.bullets.length) return;
    var box=document.createElement('div'); box.className='detail';
    var head=document.createElement('button'); head.className='detail-toggle'; head.type='button';
    head.innerHTML='<span>Ver el detalle técnico</span><span class="dt-ic">⌄</span>';
    var body=document.createElement('div'); body.className='detail-body';
    sec.bullets.forEach(function(b){
      var d=document.createElement('div'); d.className='bullet';
      d.innerHTML='<h4>'+esc(b.heading)+'</h4><p>'+esc(b.body)+'</p>'; body.appendChild(d);
    });
    head.onclick=function(){ box.classList.toggle('open'); };
    box.appendChild(head); box.appendChild(body); card.appendChild(box);
  }

  /* --------------------------- Radar (SVG) ------------------------ */
  function makeRadar(axes, color){
    var N=axes.length, W=340, H=300, cx=W/2, cy=H/2+4, R=92;
    var el=svg('svg',{ viewBox:'0 0 '+W+' '+H, 'class':'radar' });
    function pt(i,rad){ var ang=-Math.PI/2 + i*2*Math.PI/N; return [cx+Math.cos(ang)*rad, cy+Math.sin(ang)*rad]; }
    function poly(rad){ var d=''; for(var i=0;i<N;i++){ var p=pt(i,rad); d+=(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1); } return d+'Z'; }
    [0.25,0.5,0.75,1].forEach(function(rr){ el.appendChild(svg('path',{ d:poly(R*rr), 'class':'radar-ring' })); });
    axes.forEach(function(ax,i){
      var p=pt(i,R);
      el.appendChild(svg('line',{ x1:cx, y1:cy, x2:p[0], y2:p[1], 'class':'radar-axis' }));
      var lp=pt(i,R+22);
      var anchor = Math.abs(lp[0]-cx)<8 ? 'middle' : (lp[0]>cx?'start':'end');
      var t=svg('text',{ x:lp[0], y:lp[1], 'class':'radar-label', 'text-anchor':anchor, 'dominant-baseline':'middle' });
      var n1=svg('tspan',{ x:lp[0] }); n1.textContent=ax.label; t.appendChild(n1);
      var n2=svg('tspan',{ x:lp[0], dy:'1.15em', 'class':'radar-pct' }); n2.textContent='P'+Math.round(ax.value||0); t.appendChild(n2);
      el.appendChild(t);
    });
    function dataR(v){ return R*Math.max(0.04,Math.min(1,(v||0)/100)); }
    var area=svg('path',{ d:'', 'class':'radar-area', fill:color, stroke:color });
    var d=''; axes.forEach(function(ax,i){ var p=pt(i,dataR(ax.value)); d+=(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1); });
    area.setAttribute('d', d+'Z'); el.appendChild(area);
    axes.forEach(function(ax,i){ var p=pt(i,dataR(ax.value));
      el.appendChild(svg('circle',{ cx:p[0], cy:p[1], r:3.6, fill:ax.color||color, 'class':'radar-dot' })); });
    var wrap=document.createElement('div'); wrap.className='radar-wrap'; wrap.appendChild(el);
    return wrap;
  }

  /* --------------------- Curva de campana (CI) -------------------- */
  function makeBellCurve(cog){
    var W=340, H=176, padX=26, baseY=H-36, top=14, loIQ=55, hiIQ=145, amp=baseY-top;
    function x(iq){ return padX+(iq-loIQ)/(hiIQ-loIQ)*(W-2*padX); }
    function g(iq){ var z=(iq-100)/15; return Math.exp(-z*z/2); }
    var el=svg('svg',{ viewBox:'0 0 '+W+' '+H, 'class':'bell' });
    var area='M '+padX+' '+baseY, line='';
    for(var iq=loIQ; iq<=hiIQ; iq+=2){ var px=x(iq), py=baseY-g(iq)*amp;
      area+=' L '+px.toFixed(1)+' '+py.toFixed(1); line+=(line?'L':'M')+px.toFixed(1)+' '+py.toFixed(1)+' '; }
    area+=' L '+x(hiIQ)+' '+baseY+' Z';
    el.appendChild(svg('path',{ d:area, 'class':'bell-area' }));
    el.appendChild(svg('path',{ d:line, 'class':'bell-curve' }));
    [70,85,100,115,130].forEach(function(tk){ var px=x(tk);
      el.appendChild(svg('line',{ x1:px, y1:baseY, x2:px, y2:baseY+4, 'class':'bell-tick' }));
      var tl=svg('text',{ x:px, y:baseY+15, 'class':'bell-tickl', 'text-anchor':'middle' }); tl.textContent=tk; el.appendChild(tl);
    });
    el.appendChild(svg('line',{ x1:padX, y1:baseY, x2:W-padX, y2:baseY, 'class':'bell-base' }));
    cog.forEach(function(c, idx){ var cx=x(Math.max(loIQ,Math.min(hiIQ,c.iq))), cy=baseY-g(c.iq)*amp;
      var ly=Math.max(10, cy-8-idx*11); // escalonado: evita que g/Gf/Gc se solapen si los CI están cerca
      el.appendChild(svg('line',{ x1:cx, y1:baseY, x2:cx, y2:cy, 'class':'bell-mark', stroke:c.color }));
      el.appendChild(svg('circle',{ cx:cx, cy:cy, r:4.2, fill:c.color, 'class':'bell-dot' }));
      var lab=svg('text',{ x:cx, y:ly, 'text-anchor':'middle', 'class':'bell-lab', fill:c.color }); lab.textContent=c.key; el.appendChild(lab);
    });
    var wrap=document.createElement('div'); wrap.className='bell-wrap'; wrap.appendChild(el);
    var capEl=document.createElement('div'); capEl.className='bell-cap';
    capEl.innerHTML='La mayoría de las personas se sitúa cerca de 100 (el centro). Cuanto más a la derecha, mayor la puntuación.<br><b>g</b> = capacidad general · <b>Gf</b> = razonamiento · <b>Gc</b> = conocimiento.';
    wrap.appendChild(capEl);
    return wrap;
  }

  /* ----------------------------- Barras --------------------------- */
  function makeBars(rows, scoreMode){
    var wrap=document.createElement('div'); wrap.className='bars';
    rows.forEach(function(r){
      var v=Math.max(0,Math.min(100,r.value||0));
      var row=document.createElement('div'); row.className='bar-row';
      var meta=(r.lvl?esc(r.lvl)+' · ':'')+(scoreMode?(v+'/100'):('P'+v));
      row.innerHTML=
        '<div class="bar-head"><b>'+esc(r.label)+(r.sub?' <span class="muted small">'+esc(r.sub)+'</span>':'')+'</b>'+
        '<span class="lvl">'+meta+'</span></div>'+
        '<div class="track"><i style="background:linear-gradient(90deg,'+(r.color||'#5b8cff')+',#33d6a6)"></i></div>';
      row._fill=row.querySelector('i'); row._target=v;
      wrap.appendChild(row);
    });
    return wrap;
  }

  /* --------------------------- Animación -------------------------- */
  function animateReport(root){
    gFrom(root.querySelectorAll('.card'),{ y:24, opacity:0, duration:.5, stagger:.07, ease:'power3.out' });
    gFrom(root.querySelectorAll('.snap-tile'),{ y:14, opacity:0, duration:.5, stagger:.05, delay:.15, ease:'power3.out' });
    gFrom(root.querySelectorAll('.insight-card, .lvl-chip, .stat-chip'),{ y:12, opacity:0, duration:.45, stagger:.04, delay:.2, ease:'power3.out' });
    root.querySelectorAll('.bar-row').forEach(function(row,i){
      var fill=row._fill, target=(row._target||0)+'%';
      if(GS) GS.to(fill,{ width:target, duration:1, delay:.3+i*.05, ease:'power2.out' });
      else fill.style.width=target;
    });
    if(!GS) return;
    root.querySelectorAll('.radar-area').forEach(function(a){ GS.from(a,{ opacity:0, duration:.7, ease:'power2.out', delay:.2 }); });
    root.querySelectorAll('.radar-dot').forEach(function(d,i){ GS.from(d,{ scale:0, transformOrigin:'50% 50%', duration:.4, delay:.35+i*.05, ease:'back.out(2)' }); });
    root.querySelectorAll('.bell-curve').forEach(function(c){
      var len=(c.getTotalLength?c.getTotalLength():400); c.style.strokeDasharray=len;
      GS.fromTo(c,{ strokeDashoffset:len },{ strokeDashoffset:0, duration:1.1, ease:'power2.out', delay:.3 });
    });
    root.querySelectorAll('.bell-dot').forEach(function(d,i){ GS.from(d,{ scale:0, transformOrigin:'50% 50%', duration:.45, delay:.8+i*.12, ease:'back.out(2)' }); });
    root.querySelectorAll('.spec-marker').forEach(function(mk){ GS.from(mk,{ opacity:0, y:-8, duration:.5, delay:.7, ease:'power3.out' }); });
  }

  /* ------------------------ Exportar a PDF ------------------------ */
  function downloadPdf(){
    var root=$('report-root');
    var btns=Array.prototype.slice.call(document.querySelectorAll('.pdf-btn'));
    btns.forEach(function(b){ b.disabled=true; if(!b.dataset.t) b.dataset.t=b.textContent; b.textContent='Generando PDF…'; });
    function restore(){ btns.forEach(function(b){ b.disabled=false; if(b.dataset.t) b.textContent=b.dataset.t; }); }
    if(typeof html2pdf==='undefined'){ restore(); window.print(); return; }

    var name=String((STATE.participant&&STATE.participant.name)||'Perfil')
      .replace(/[^\wÀ-ÿ \-]/g,'').trim().replace(/\s+/g,'-') || 'Perfil';
    // Mide la altura real con el detalle desplegado. Añadir y quitar 'pdf-mode' en el
    // mismo frame fuerza max-height:none (medida exacta) sin que el usuario vea el cambio.
    document.body.classList.add('pdf-mode');
    var h=root.scrollHeight||3000;
    document.body.classList.remove('pdf-mode');
    // Escala dinámica: mantiene el lienzo de html2canvas bajo el límite (~16k px).
    var scale=Math.min(2, Math.max(1.0, 15000/h));
    var opt={
      margin:[26,16,30,16],
      filename:'Perfil-Integral-'+name+'.pdf',
      image:{ type:'jpeg', quality:0.96 },
      html2canvas:{ scale:scale, backgroundColor:'#0a0f20', useCORS:true, windowWidth:root.scrollWidth,
        onclone:function(doc){ doc.body.classList.add('pdf-mode');
          Array.prototype.forEach.call(doc.querySelectorAll('.detail'), function(d){ d.classList.add('open'); }); } },
      jsPDF:{ unit:'pt', format:'a4', orientation:'portrait' },
      pagebreak:{ mode:['css','legacy'], avoid:['.snap-tile','.insight-card','.bullet','.takeaway','.reco','.stat-chip','.lvl-chip','.radar-wrap','.bell-wrap','.sec-head'] }
    };
    setTimeout(function(){
      html2pdf().set(opt).from(root).save().then(restore).catch(function(e){ restore(); alert('No se pudo generar el PDF: '+e); });
    }, 60);
  }

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
})();
</script>
